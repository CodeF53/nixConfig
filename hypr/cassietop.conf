input {
    sensitivity = -0.1 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat
}

monitor=eDP-1, highres, 0x0, auto, bitdepth, 10
monitor=DP-3, highres, auto-down, auto, bitdepth, 10

