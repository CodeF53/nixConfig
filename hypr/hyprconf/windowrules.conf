# https://wiki.hypr.land/Configuring/Window-Rules/
windowrule {
    name = zenpip
    match:class = ^(zen-beta)$
    match:title = ^(Picture-in-Picture)$

    float = yes
    pin = yes
    size = 400 225
}

# Ignore maximize requests from apps
windowrule = suppress_event maximize, match:class .*
# Fix some dragging issues with XWayland
windowrule {
    name = XWaylandDraggingShit

    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# focus things when they want focus, ie: tab opened in zen from some other app
misc {
    focus_on_activate = true
}

windowrule {
    name = flameshot
    match:title = flameshot

    no_anim = true
    float = true
    move = 0 0
    pin = true
    no_initial_focus = true
    suppress_event = activate activatefocus
    # hyprlang if IS_CASSIEBOX
    monitor = HDMI-A-2
    # hyprlang endif
    # hyprlang if IS_CASSIETOP
    monitor = eDP-1
    # hyprlang endif
}
